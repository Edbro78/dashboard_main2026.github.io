<!DOCTYPE html>
<html lang="nb">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&amp;P Wealth &amp; Ownership Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --sp-dark-blue: oklch(0.24 0.08 273.1);
            --sp-blue: oklch(0.29 0.12 274.6);
            --sp-cyan-40: oklch(0.85 0.08 235.3);
            --sp-cyan-20: oklch(0.92 0.05 234.1);
            --sp-light-grey: oklch(0.96 0.00 0.0);
            --sp-coal: oklch(0.27 0.00 0.0);
            --white: #ffffff;
            --font-brand: "Whitney", "Whitney Book", "Whitney Medium", "Whitney Bold", "Avenir Next", "Segoe UI", Arial, sans-serif;
        }

        body {
            font-family: var(--font-brand);
            background-color: #F5F3F3;
            color: var(--white);
            overflow: hidden;
            min-height: 100vh;
            margin: 0;
            font-weight: 400;
        }

        .label-style {
            font-family: var(--font-brand);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.65rem;
            color: var(--sp-cyan-40);
            margin-bottom: 0.25rem;
            display: block;
        }

        .h-black { font-family: var(--font-brand); font-weight: 900; }
        .h-bold { font-family: var(--font-brand); font-weight: 700; }

        h1, h2, h3 {
            font-family: var(--font-brand);
            letter-spacing: 0.01em;
        }

        p, span, input, select, option, label {
            font-family: var(--font-brand);
            font-weight: 400;
        }

        button {
            font-family: var(--font-brand);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .glass-card {
            background: #0F2F73;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(153, 217, 242, 0.15);
            box-shadow:
                0 14px 30px rgba(2, 12, 34, 0.28),
                0 28px 60px rgba(2, 12, 34, 0.24),
                0 3px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: var(--sp-cyan-40);
            background: #11377F;
            box-shadow:
                0 18px 36px rgba(2, 12, 34, 0.32),
                0 34px 72px rgba(2, 12, 34, 0.28),
                0 4px 14px rgba(0, 0, 0, 0.24);
            transform: translateY(-5px);
        }

        .owner-node {
            border-top: 4px solid var(--sp-cyan-40);
        }

        .family-line {
            stroke: #D1D5DB;
            stroke-width: 2.5;
            fill: none;
            opacity: 0.6;
        }

        .ownership-line {
            stroke: var(--sp-cyan-40);
            stroke-opacity: 0.7;
            fill: none;
            stroke-dasharray: 6;
            animation: dash 40s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 35, 89, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .tree-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8rem 2rem 12rem;
            min-width: max-content;
            gap: 7.65rem;
        }

        .level-row {
            display: flex;
            justify-content: center;
            gap: 2.7rem;
            position: relative;
            z-index: 10;
        }

        /* Reduser avstand mellom barn- og partner-rad med 20 % (fra 10rem til 8rem). */
        #row-children {
            margin-bottom: -2rem;
        }

        #company-hierarchy-root {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 7.65rem;
            width: 100%;
        }

        .edit-controls { display: none; }
        body.edit-mode .edit-controls { display: flex; }

        .header-action-btn {
            border: 1px solid #CECCCC;
            background: #123B85;
            color: #E2E8F0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.625rem 1.5rem;
            font-size: 0.75rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .header-action-btn:hover {
            filter: brightness(1.08);
            background: #0F3273;
        }

        /* Mer indre luft i alle kort. */
        .struktur-card {
            padding: 1.75rem;
            border-radius: 24px !important;
        }

        /* Komprimer kun barn-kort vertikalt (~15 % lavere). */
        .child-card {
            padding-top: 1.275rem !important;
            padding-bottom: 1.275rem !important;
        }

        .child-card .edit-controls {
            padding-top: 1rem !important;
            margin-top: 1rem !important;
        }

        /* Barn-kort: tydelig lysere blå enn øvrige glass-kort */
        .child-card.glass-card {
            background: #1e4a96;
            border-color: rgba(153, 217, 242, 0.22);
        }

        .child-card.glass-card:hover {
            background: #2457ab;
            border-color: var(--sp-cyan-40);
        }

        .struktur-topbar {
            background: #F5F3F3;
        }

        .struktur-topbar:hover {
            background: #F5F3F3;
            border-color: rgba(153, 217, 242, 0.15);
            transform: none;
        }
    </style>
</head>
<body class="edit-mode">
    <header class="struktur-topbar fixed top-0 left-0 w-full z-50 px-10 py-5 glass-card border-b border-white/10 flex justify-center items-center">
        <div class="flex gap-3 edit-controls">
            <button id="add-partner-btn" onclick="addPartner()" class="header-action-btn flex items-center gap-2">
                <i data-lucide="users" class="w-4 h-4"></i>
                <span>Legg til Partner</span>
            </button>
            <button onclick="addChild()" class="header-action-btn flex items-center gap-2">
                <i data-lucide="user-plus" class="w-4 h-4"></i>
                <span>Legg til Barn</span>
            </button>
            <button onclick="addTopLevelCompany()" class="header-action-btn flex items-center gap-2">
                <i data-lucide="building-2" class="w-4 h-4"></i>
                <span>Legg til Bedrift</span>
            </button>
        </div>
    </header>

    <div class="fixed bottom-10 right-10 z-50 flex items-center gap-10 glass-card p-6 rounded-sm">
        <div class="flex items-center gap-4">
            <div class="w-10 h-0.5 bg-gray-300 opacity-70"></div>
            <span class="text-[10px] uppercase tracking-widest text-slate-400">Familiære bånd</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="w-10 h-0.5 border-t-2 border-dashed border-[#99D9F2] opacity-70"></div>
            <span class="text-[10px] uppercase tracking-widest text-slate-400">Direkte eierskap</span>
        </div>
    </div>

    <main class="min-h-screen">
        <div id="dashboard-tree" class="tree-container">
            <div id="row-children" class="level-row"></div>
            <div id="row-partners" class="level-row"></div>
            <div id="company-hierarchy-root"></div>
        </div>
    </main>

    <svg id="svg-layer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></svg>

    <div id="edit-modal" class="modal-overlay">
        <div class="bg-[#002359] p-10 border border-white/10 w-full max-w-lg mx-4 overflow-y-auto max-h-[90vh] shadow-2xl">
            <span class="label-style text-center mb-2">Konfigurasjon</span>
            <h2 id="modal-title" class="text-2xl h-bold mb-8 text-white text-center uppercase tracking-tight">Rediger Enhet</h2>

            <form id="edit-form" class="space-y-6">
                <input type="hidden" id="edit-id">
                <input type="hidden" id="edit-parent-id">
                <input type="hidden" id="edit-type">
                <input type="hidden" id="edit-sub-type">

                <div class="space-y-1">
                    <label class="label-style">Navn</label>
                    <input type="text" id="field-name" required class="w-full bg-white/5 border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]">
                </div>

                <div id="child-specific-fields" class="hidden space-y-4 pt-4 border-t border-white/10">
                    <div class="space-y-1">
                        <label class="label-style">Type Barn</label>
                        <select id="field-child-type" onchange="toggleParentSelection()" class="w-full bg-[#002D72] border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]">
                            <option value="joint">Fellesbarn</option>
                            <option value="step">Særkullsbarn</option>
                        </select>
                    </div>
                    <div id="parent-selection-container" class="hidden space-y-1">
                        <label class="label-style">Biologisk Forelder</label>
                        <select id="field-bio-parent" class="w-full bg-[#002D72] border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]"></select>
                    </div>
                </div>

                <div id="partner-specific-fields" class="hidden space-y-1 pt-4 border-t border-white/10">
                    <label class="label-style">Relasjon</label>
                    <select id="field-partner-type" class="w-full bg-[#002D72] border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]">
                        <option value="ektefelle">Ektefelle</option>
                        <option value="samboer">Samboer</option>
                    </select>
                </div>

                <div id="ownership-distribution-section" class="hidden space-y-3 pt-4 border-t border-white/10">
                    <label class="label-style">Eierfordeling (%)</label>
                    <div id="ownership-list" class="space-y-2 max-h-48 overflow-y-auto pr-2"></div>
                </div>

                <div id="person-fields" class="grid grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="label-style">Rolle</label>
                        <input type="text" id="field-info" class="w-full bg-white/5 border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]">
                    </div>
                    <div class="space-y-1">
                        <label class="label-style">Sektor</label>
                        <input type="text" id="field-sector" class="w-full bg-white/5 border border-white/10 rounded-sm p-4 text-white focus:outline-none focus:border-[#99D9F2]">
                    </div>
                </div>

                <div class="flex gap-4 pt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 px-6 py-4 rounded-sm bg-white/5 hover:bg-white/10 transition-colors text-[11px] font-bold uppercase tracking-widest text-slate-400">Avbryt</button>
                    <button type="submit" class="btn-sp flex-1">Lagre Endringer</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let familyData = {
            partners: [
                { id: "p1", name: "Ektefelle 1", info: "Eier", sector: "Wealth Mgmt" },
                { id: "p2", name: "Ektefelle 2", info: "Eier", sector: "Wealth Mgmt" }
            ],
            children: [
                { id: "c1", name: "Barn A", info: "Arving", parentType: "joint", parentIds: ["p1", "p2"] }
            ],
            companies: [
                {
                    id: "comp1",
                    name: "Invest Holding AS",
                    shares: { p1: 50, p2: 50 },
                    children: []
                }
            ]
        };

        const modal = document.getElementById("edit-modal");
        const editForm = document.getElementById("edit-form");
        const svgLayer = document.getElementById("svg-layer");

        function toggleEditMode() {
            document.body.classList.toggle("edit-mode");
            lucide.createIcons();
        }

        function toggleParentSelection() {
            const type = document.getElementById("field-child-type").value;
            document.getElementById("parent-selection-container").classList.toggle("hidden", type !== "step");
        }

        function createCard(node, type, subType = "") {
            const isPerson = type === "person";
            const card = document.createElement("div");
            card.id = `card-${node.id}`;
            const sizeClass = subType === "child" ? "child-card" : "";
            card.className = `glass-card struktur-card w-72 relative z-10 ${isPerson ? "owner-node" : "border-l-4 border-[#99D9F2]"} ${sizeClass}`;

            const icon = isPerson ? "user" : "building-2";
            /* Samme ikonstil som ektefelle-kort (cyan, 16px, opacity-40); bedrift bruker building-2 */
            const iconSize = "w-4 h-4";
            const iconWrapOpacity = "opacity-40";
            const colorClass = "text-[#99D9F2]";
            const metaText = (!isPerson || subType === "child") ? "" : (node.info || node.sector || "");

            let ownershipSummary = "";
            if (!isPerson && node.shares) {
                const activeOwners = Object.entries(node.shares)
                    .filter(([, val]) => val > 0)
                    .map(([id, val]) => {
                        const owner = findNode(id);
                        return `<span class="bg-white/5 px-2 py-1 rounded-sm text-[8px] text-slate-300 border border-white/5 font-bold uppercase tracking-tighter">${owner ? owner.name : id}: ${val}%</span>`;
                    }).join(" ");
                ownershipSummary = `<div class="flex flex-wrap gap-1.5 mt-4">${activeOwners}</div>`;
            }

            const labelTxt = isPerson ? (subType === "partner" ? "Eier / Partner" : subType === "child" ? "Barn" : "") : "Selskap";

            card.innerHTML = `
                <span class="label-style">${labelTxt}</span>
                <div class="flex justify-between items-start mb-3">
                    <h3 class="h-bold text-lg leading-tight text-white">${node.name}</h3>
                    <div class="${iconWrapOpacity}"><i data-lucide="${icon}" class="${colorClass} ${iconSize}"></i></div>
                </div>
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">${metaText}</p>
                ${ownershipSummary}

                <div class="edit-controls flex gap-2 pt-5 mt-5 border-t border-white/10">
                    <button onclick="openEditModal('${node.id}', '${type}', '${subType}')" class="p-2 bg-white/5 hover:bg-white/10 rounded-sm transition-colors">
                        <i data-lucide="edit-3" class="w-3.5 h-3.5 text-slate-300"></i>
                    </button>
                    ${subType === "partner" ? `<button onclick="addChild()" class="p-2 bg-white/5 hover:bg-cyan-500/10 rounded-sm transition-colors text-[#99D9F2]"><i data-lucide="user-plus" class="w-3.5 h-3.5"></i></button>` : ""}
                    ${type === "company" ? `<button onclick="addSubCompany('${node.id}')" class="p-2 bg-white/5 hover:bg-cyan-500/10 rounded-sm transition-colors text-[#99D9F2]"><i data-lucide="plus-square" class="w-3.5 h-3.5"></i></button>` : ""}
                    <button onclick="deleteNode('${node.id}', '${type}')" class="p-2 bg-white/5 hover:bg-red-500/10 rounded-sm transition-colors ml-auto text-red-400/50">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            `;
            return card;
        }

        function renderTree() {
            document.getElementById("row-partners").innerHTML = "";
            document.getElementById("row-children").innerHTML = "";
            document.getElementById("company-hierarchy-root").innerHTML = "";

            familyData.partners.forEach((p) => document.getElementById("row-partners").appendChild(createCard(p, "person", "partner")));
            familyData.children.forEach((c) => document.getElementById("row-children").appendChild(createCard(c, "person", "child")));
            renderCompaniesRecursive(familyData.companies, document.getElementById("company-hierarchy-root"));

            const addPartnerBtn = document.getElementById("add-partner-btn");
            if (familyData.partners.length >= 2) {
                addPartnerBtn.style.opacity = "0.3";
                addPartnerBtn.style.pointerEvents = "none";
            } else {
                addPartnerBtn.style.opacity = "1";
                addPartnerBtn.style.pointerEvents = "auto";
            }

            lucide.createIcons();
            syncStrukturToParent();
            setTimeout(drawLines, 50);
        }

        function cloneFamilyDataForParent() {
            try {
                return JSON.parse(JSON.stringify(familyData));
            } catch (e) {
                return null;
            }
        }

        function applyFamilyDataFromParent(data) {
            if (!data || typeof data !== "object") return false;
            if (!Array.isArray(data.partners) || !Array.isArray(data.children) || !Array.isArray(data.companies)) return false;
            familyData = {
                partners: JSON.parse(JSON.stringify(data.partners)),
                children: JSON.parse(JSON.stringify(data.children)),
                companies: JSON.parse(JSON.stringify(data.companies))
            };
            return true;
        }

        window.addEventListener("message", function (event) {
            const d = event && event.data;
            if (!d || d.type !== "struktur-dashboard-init") return;
            if (window.parent === window) return;
            applyFamilyDataFromParent(d.familyData);
            renderTree();
        });

        function syncStrukturToParent() {
            if (window.parent === window) return;
            const partners = (familyData.partners || []).slice(0, 2).map((p, index) => ({
                id: p.id,
                name: String(p.name || "").trim() || `Ektefelle ${index === 0 ? "I" : "II"}`
            }));
            const companies = [];
            const collectCompanies = (arr) => {
                (arr || []).forEach((c) => {
                    companies.push({
                        id: c.id,
                        name: String(c.name || "").trim() || "Selskap"
                    });
                    if (c.children && c.children.length) collectCompanies(c.children);
                });
            };
            collectCompanies(familyData.companies || []);
            window.parent.postMessage({
                type: "struktur-dashboard-sync",
                partners,
                companies,
                familyData: cloneFamilyDataForParent()
            }, "*");
        }

        function renderCompaniesRecursive(companies, container) {
            if (!companies || companies.length === 0) return;
            const row = document.createElement("div");
            row.className = "level-row";
            container.appendChild(row);
            companies.forEach((comp) => {
                const col = document.createElement("div");
                col.className = "flex flex-col items-center gap-14";
                col.appendChild(createCard(comp, "company"));
                row.appendChild(col);
                if (comp.children && comp.children.length > 0) renderCompaniesRecursive(comp.children, col);
            });
        }

        function openEditModal(id, type, subType = "", parentId = "") {
            const node = findNode(id);
            document.getElementById("edit-id").value = id || "";
            document.getElementById("edit-parent-id").value = parentId || "";
            document.getElementById("edit-type").value = type;
            document.getElementById("edit-sub-type").value = subType;

            document.getElementById("field-name").value = node ? node.name : "";
            document.getElementById("field-info").value = node ? (node.info || "") : "";
            document.getElementById("field-sector").value = node ? (node.sector || "") : "";

            const isChild = subType === "child" || (type === "person" && !id && subType !== "partner");
            const isPartner = type === "person" && subType === "partner";
            document.getElementById("child-specific-fields").classList.toggle("hidden", !isChild);
            document.getElementById("partner-specific-fields").classList.toggle("hidden", !isPartner);
            if (isChild) {
                const typeField = document.getElementById("field-child-type");
                const bioField = document.getElementById("field-bio-parent");
                typeField.value = node?.parentType || "joint";
                bioField.innerHTML = "";
                familyData.partners.forEach((p) => bioField.innerHTML += `<option value="${p.id}">${p.name}</option>`);
                if (node?.parentIds?.length === 1) bioField.value = node.parentIds[0];
                toggleParentSelection();
            }
            if (isPartner) {
                document.getElementById("field-partner-type").value = node?.relationType || "ektefelle";
            }

            const showPersonFields = type === "person" && subType !== "partner" && subType !== "child";
            document.getElementById("person-fields").classList.toggle("hidden", !showPersonFields);
            document.getElementById("ownership-distribution-section").classList.toggle("hidden", type !== "company");

            if (type === "company") populateOwnershipList(node ? node.shares : null, parentId);
            modal.classList.add("active");
        }

        function populateOwnershipList(existingShares, parentId) {
            const list = document.getElementById("ownership-list");
            list.innerHTML = "";
            const allOwners = [...familyData.partners, ...familyData.children];
            const collectCompanies = (arr) => arr.forEach((c) => { allOwners.push(c); if (c.children) collectCompanies(c.children, allOwners); });
            collectCompanies(familyData.companies);

            allOwners.forEach((p) => {
                if (document.getElementById("edit-id").value === p.id) return;
                let val = 0;
                if (existingShares?.[p.id] !== undefined) val = existingShares[p.id];
                else if (!existingShares) {
                    if (parentId && p.id === parentId) val = 100;
                    else if (!parentId) {
                        if (familyData.partners.length === 1 && p.id === familyData.partners[0].id) val = 100;
                        else if (familyData.partners.length === 2 && familyData.partners.some((part) => part.id === p.id)) val = 50;
                    }
                }
                list.innerHTML += `<div class="flex items-center justify-between p-3 bg-white/5 rounded-sm border border-white/5 mb-2">
                    <span class="text-[10px] text-white font-bold uppercase tracking-widest">${p.name}</span>
                    <div class="flex items-center gap-2">
                        <input type="number" data-owner-id="${p.id}" value="${val}" class="share-input w-16 bg-[#002D72] border border-white/10 rounded-sm px-2 py-1 text-right text-xs text-[#99D9F2]">
                        <span class="text-[10px] text-slate-500 font-bold">%</span>
                    </div>
                </div>`;
            });
        }

        function addPartner() { if (familyData.partners.length < 2) openEditModal("", "person", "partner"); }
        function addChild() { openEditModal("", "person", "child"); }
        function addTopLevelCompany() { openEditModal("", "company"); }
        function addSubCompany(id) { openEditModal("", "company", "", id); }
        function closeModal() { modal.classList.remove("active"); }

        editForm.onsubmit = (e) => {
            e.preventDefault();
            const id = document.getElementById("edit-id").value;
            const parentId = document.getElementById("edit-parent-id").value;
            const type = document.getElementById("edit-type").value;
            const subType = document.getElementById("edit-sub-type").value;

            const data = {
                name: document.getElementById("field-name").value,
                info: document.getElementById("field-info").value,
                sector: document.getElementById("field-sector").value
            };

            if (subType === "child" || (type === "person" && !id && subType !== "partner")) {
                const cType = document.getElementById("field-child-type").value;
                data.parentType = cType;
                data.parentIds = cType === "joint" ? familyData.partners.map((p) => p.id) : [document.getElementById("field-bio-parent").value];
            }
            if (type === "person" && subType === "partner") {
                data.relationType = document.getElementById("field-partner-type").value || "ektefelle";
            }

            if (type === "company") {
                data.shares = {};
                document.querySelectorAll(".share-input").forEach((input) => {
                    const v = parseInt(input.value, 10) || 0;
                    if (v > 0) data.shares[input.dataset.ownerId] = v;
                });
            }

            if (id) {
                Object.assign(findNode(id), data);
            } else {
                const newId = (type === "person" ? (subType === "partner" ? "p" + Date.now() : "c" + Date.now()) : "comp" + Date.now());
                const newNode = { id: newId, ...data, children: [] };
                if (subType === "partner") familyData.partners.push(newNode);
                else if (subType === "child" || type === "person") familyData.children.push(newNode);
                else if (parentId) findNode(parentId).children.push(newNode);
                else familyData.companies.push(newNode);
            }

            closeModal();
            renderTree();
        };

        function findNode(id, arr = null) {
            if (!id) return null;
            if (!arr) return findNode(id, familyData.partners) || findNode(id, familyData.children) || findNode(id, familyData.companies);
            for (const n of arr) {
                if (n.id === id) return n;
                if (n.children) {
                    const f = findNode(id, n.children);
                    if (f) return f;
                }
            }
            return null;
        }

        function deleteNode(id, type) {
            if (type === "person") {
                const isPartner = familyData.partners.some((p) => p.id === id);
                familyData.partners = familyData.partners.filter((p) => p.id !== id);
                familyData.children = familyData.children.filter((c) => c.id !== id);
                if (isPartner && familyData.partners.length === 1) {
                    const remainingId = familyData.partners[0].id;
                    const updateShares = (arr) => arr.forEach((c) => {
                        if (c.shares?.[id]) {
                            const val = c.shares[id];
                            delete c.shares[id];
                            c.shares[remainingId] = (c.shares[remainingId] || 0) + val;
                        }
                        if (c.children) updateShares(c.children);
                    });
                    updateShares(familyData.companies);
                } else {
                    const clean = (arr) => arr.forEach((c) => {
                        if (c.shares) delete c.shares[id];
                        if (c.children) clean(c.children);
                    });
                    clean(familyData.companies);
                }
            } else {
                const recRem = (arr) => {
                    const i = arr.findIndex((c) => c.id === id);
                    if (i !== -1) {
                        arr.splice(i, 1);
                        return true;
                    }
                    for (const c of arr) if (c.children && recRem(c.children)) return true;
                    return false;
                };
                recRem(familyData.companies);
            }
            renderTree();
        }

        function drawLines() {
            svgLayer.innerHTML = "";
            const scrollX = window.scrollX;
            const scrollY = window.scrollY;

            familyData.children.forEach((child) => {
                const childEl = document.getElementById(`card-${child.id}`);
                if (!childEl) return;
                const childCard = childEl.getBoundingClientRect();
                const cX = childCard.left + childCard.width / 2 + scrollX;
                const cY = childCard.bottom + scrollY;

                if (child.parentType === "joint" && familyData.partners.length >= 2) {
                    const pA = document.getElementById(`card-${familyData.partners[0].id}`);
                    const pB = document.getElementById(`card-${familyData.partners[1].id}`);
                    if (!pA || !pB) return;
                    const r1 = pA.getBoundingClientRect();
                    const r2 = pB.getBoundingClientRect();
                    const startX = (r1.left + r2.right) / 2 + scrollX;
                    const startY = r1.top + r1.height / 2 + scrollY;
                    drawFamilyCurve(startX, startY, cX, cY);
                } else if (child.parentIds?.length > 0) {
                    const pC = document.getElementById(`card-${child.parentIds[0]}`);
                    if (pC) {
                        const r = pC.getBoundingClientRect();
                        drawFamilyCurve(r.left + r.width / 2 + scrollX, r.top + scrollY, cX, cY);
                    }
                }
            });

            if (familyData.partners.length > 1) {
                const pA = document.getElementById(`card-${familyData.partners[0].id}`);
                const pB = document.getElementById(`card-${familyData.partners[1].id}`);
                if (pA && pB) {
                    const r1 = pA.getBoundingClientRect();
                    const r2 = pB.getBoundingClientRect();
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", r1.right + scrollX);
                    line.setAttribute("y1", r1.top + r1.height / 2 + scrollY);
                    line.setAttribute("x2", r2.left + scrollX);
                    line.setAttribute("y2", r2.top + r2.height / 2 + scrollY);
                    line.setAttribute("class", "family-line");
                    svgLayer.appendChild(line);
                }
            }

            const collect = (arr, list) => arr.forEach((c) => { list.push(c); if (c.children) collect(c.children, list); });
            const allC = [];
            collect(familyData.companies, allC);

            allC.forEach((comp) => {
                const compEl = document.getElementById(`card-${comp.id}`);
                if (!compEl) return;
                const rC = compEl.getBoundingClientRect();
                const cX = rC.left + rC.width / 2 + scrollX;
                const cY = rC.top + scrollY;
                if (comp.shares) {
                    Object.entries(comp.shares).forEach(([oid, pct]) => {
                        const oC = document.getElementById(`card-${oid}`);
                        if (oC) {
                            const rO = oC.getBoundingClientRect();
                            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                            const sX = rO.left + rO.width / 2 + scrollX;
                            const sY = rO.bottom + scrollY;
                            const mY = sY + (cY - sY) * 0.5;
                            path.setAttribute("d", `M ${sX} ${sY} C ${sX} ${mY}, ${cX} ${mY}, ${cX} ${cY}`);
                            path.setAttribute("class", "ownership-line");
                            path.style.strokeWidth = 1 + (pct / 33);
                            svgLayer.appendChild(path);
                        }
                    });
                }
                if (comp.children) comp.children.forEach((sub) => {
                    const sElem = document.getElementById(`card-${sub.id}`);
                    if (sElem) {
                        const rSub = sElem.getBoundingClientRect();
                        drawFamilyCurve(cX, rC.bottom + scrollY, rSub.left + rSub.width / 2 + scrollX, rSub.top + scrollY);
                    }
                });
            });

            svgLayer.setAttribute("width", document.documentElement.scrollWidth);
            svgLayer.setAttribute("height", document.documentElement.scrollHeight);
        }

        function drawFamilyCurve(sx, sy, ex, ey) {
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            const my = sy + (ey - sy) / 2;
            path.setAttribute("d", `M ${sx} ${sy} C ${sx} ${my}, ${ex} ${my}, ${ex} ${ey}`);
            path.setAttribute("class", "family-line");
            svgLayer.appendChild(path);
        }

        window.onload = () => {
            window.onresize = drawLines;
            if (window.parent === window) {
                renderTree();
            }
        };
    </script>
</body>
</html>
